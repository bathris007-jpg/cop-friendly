<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Cop Protector</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Mukta+Malar:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="centered-body">
    <div class="watermark-emblem"></div>
    <div class="bento-card auth-card">
        <h1 class="text-center"><span class="temple-bronze">Officer</span> <span class="electric-gold">Registration</span></h1>
        <p class="subtitle text-center">Create your personal TN_CORE credentials</p>
        
        <form id="register-form">
            <div class="form-group">
                <label for="aadhaar">Choose your Officer ID (e.g. COP-999)</label>
                <input type="text" id="aadhaar" class="neon-input" placeholder="XXXX-XXXX-XXXX" required>
            </div>
            <div class="form-group">
                <label for="key">Create Encryption Key (Password)</label>
                <input type="password" id="key" class="neon-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary full-width" style="background: linear-gradient(135deg, var(--color-temple-bronze) 0%, var(--color-electric-gold) 100%);">Register Account</button>
            
            <p style="text-align: center; margin-top: 15px; font-size: 0.85rem;">
                <a href="login.html" style="color: var(--color-electric-gold); text-decoration: none;">Already registered? Login here</a>
            </p>
        </form>
    </div>
    <script>
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const cop_id = document.getElementById('aadhaar').value;
            const password = document.getElementById('key').value;
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cop_id, password })
                });
                
                const result = await response.json();
                if (result.success) {
                    alert('Registration successful! You can now login.');
                    window.location.href = 'login.html'; 
                } else {
                    alert('Registration failed: ' + result.error);
                }
            } catch (error) {
                console.error('Error during registration:', error);
                alert('Connection error. Is the backend running?');
            }
        });
    </script>
</body>
</html>
