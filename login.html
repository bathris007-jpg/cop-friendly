<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cop Protector</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Mukta+Malar:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="centered-body">
    <div class="watermark-emblem"></div>
    <div class="bento-card auth-card">
        <h1 class="text-center"><span class="temple-bronze">Cop Protector</span> <span class="electric-gold">Access</span></h1>
        <p class="subtitle text-center">Tamil Nadu Public Safety Network</p>
        
        <form id="login-form" action="complaint.html">
            <div class="form-group">
                <label for="aadhaar">Aadhaar ID / Officer ID</label>
                <input type="text" id="aadhaar" class="neon-input" placeholder="XXXX-XXXX-XXXX" required>
            </div>
            <div class="form-group">
                <label for="key">Encryption Key</label>
                <input type="password" id="key" class="neon-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary full-width">Authenticate to Core</button>
            <p style="text-align: center; margin-top: 15px; font-size: 0.85rem;">
                <a href="register.html" style="color: var(--color-electric-gold); text-decoration: none;">Need a personal login? Register here</a>
            </p>
        </form>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const cop_id = document.getElementById('aadhaar').value;
            const password = document.getElementById('key').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cop_id, password })
                });
                
                const result = await response.json();
                if (result.success) {
                    // Redirect to the main dashboard or complaint form
                    window.location.href = 'index.html'; 
                } else {
                    alert('Authentication failed: ' + result.error);
                }
            } catch (error) {
                console.error('Error during login:', error);
                alert('Connection error. Is the backend running?');
            }
        });
    </script>
</body>
</html>
